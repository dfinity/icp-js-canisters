# A GitHub Actions workflow that regularly makes a PR to update
# the IC candid and code bindings.
name: Update IC
on:
  schedule:
    # Checks for new IC commit weekly
    - cron: '30 3 * * MON'
  workflow_dispatch:
    # Provides an option to run this manually
    inputs:
      ic_ref:
        description: "The IC commit or tag to update to."
        required: false

jobs:
  update-ic:
    runs-on: ubuntu-24.04
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ vars.PR_AUTOMATION_BOT_PUBLIC_APP_ID }}
          private-key: ${{ secrets.PR_AUTOMATION_BOT_PUBLIC_PRIVATE_KEY }}
      - name: Checkout ic-js
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Choose IC ref
        id: choose_ic_ref
        run: |
           ref="${{ inputs.ic_ref }}"
           if [[ "${requested_ref:-}" == "" ]]
           then # Use the latest release
                ref="$(gh release --repo dfinity/ic view --json tagName -q .tagName)"
           fi
           echo "ic_ref=$ref" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Checkout ic repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: dfinity/ic
          ref: ${{ steps.choose_ic_ref.outputs.ic_ref }}
          path: ic
      - name: Prepare
        uses: ./.github/actions/prepare
      - name: Update candid and related JS and TS files
        id: update
        run: |
          set -euxo pipefail
          # Gets candid
          ./scripts/import-candid ic
          # Derives consequences
          ./scripts/compile-idl-js
          # Checks whether it was all for nothing.
          # ... Note: Ignores how we got here.
          set +x # Printing the diff to stderr repeatedly can be very noisy.
          DIFF_IGNORING_PROVENANCE="$(git diff -I '\/\/ Generated from IC repo.*')"
          if [[ "${DIFF_IGNORING_PROVENANCE:-}" == "" ]]
          then
            commit="$(cd ic && git rev-parse --short HEAD)"
            echo "No signficant differences found in IC ref ${{ inputs.ic_ref }} (commit $commit)."
            echo "updated=0" >> "$GITHUB_OUTPUT"
          else
            echo "API changes detected!"
            git status
            echo "updated=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        id: create_pull_request
        if: ${{ steps.update.outputs.updated == '1' }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: main
          add-paths: |
            packages/**/*.did
            packages/**/*.js
            packages/**/*.ts
          commit-message: Update IC commit
          committer: GitHub <noreply@github.com>
          author: gix-bot <gix-bot@users.noreply.github.com>
          branch: bot-ic-update
          branch-suffix: timestamp # Creates a new branch & PR with every run.  If this gets spammy, please delete this line and instead block the PR from making a PR if there is already an open one.
          delete-branch: true
          title: 'feat(core): Update Candid Files'
          body: |
            # Motivation
            The canisters APIs have been updated.

            # Changes
            * Updated the candid interface files for the canisters used in this library.
            * Updated the javascript bindings for the latest candid interfaces.

            # Tests
              - [ ] Please check the API updates for any breaking changes that affect our code.
      - name: Close previous IC update pull requests
        if: ${{ steps.update.outputs.updated == '1' && steps.create_pull_request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_PR_NUMBER: ${{ steps.create_pull_request.outputs.pull-request-number }}
          PR_BRANCH_PREFIX: bot-ic-update
          PR_TITLE: 'feat(core): Update Candid Files'
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Run gh separately so a failure (auth, rate limit) aborts the step
          # instead of being swallowed by process substitution.
          previous_prs_tsv="$(
            gh pr list \
              --repo "$REPO" \
              --state open \
              --limit 200 \
              --json number,title,headRefName,headRepositoryOwner \
              --jq '.[] | select(.number != (env.NEW_PR_NUMBER | tonumber) and .title == env.PR_TITLE and (.headRefName | startswith(env.PR_BRANCH_PREFIX)) and .headRepositoryOwner.login == env.REPO_OWNER) | [.number, .headRefName] | @tsv'
          )"

          if [[ -z "$previous_prs_tsv" ]]; then
            echo "No previous IC update pull requests to close."
            exit 0
          fi

          mapfile -t previous_prs <<< "$previous_prs_tsv"

          close_comment="Closing this superseded automated IC Candid update PR because workflow run ${RUN_URL} opened PR #${NEW_PR_NUMBER} as a fresh replacement. The new PR contains the latest generated Candid files and bindings, so keeping older generated PRs open creates duplicate review work."

          for pr in "${previous_prs[@]}"; do
            IFS=$'\t' read -r number branch <<< "$pr"
            echo "Closing PR #${number} (${branch}) and deleting its branch."
            gh pr close "$number" --repo "$REPO" --delete-branch --comment "$close_comment"
          done
